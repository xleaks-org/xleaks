{{range .Posts}}
<article class="border-b border-gray-800 px-4 py-3 hover:bg-gray-900/50 transition-colors cursor-pointer" onclick="if(!event.target.closest('button,a')){window.location='/post/{{.ID}}'}">
    <div class="flex gap-3">
        <div class="w-10 h-10 rounded-full bg-gray-700 flex-shrink-0 flex items-center justify-center text-sm font-bold">
            {{.AuthorInitial}}
        </div>
        <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 text-sm">
                <span class="font-semibold hover:underline">{{.AuthorName}}</span>
                <span class="text-gray-500 font-mono text-xs">{{.ShortPubkey}}</span>
                <span class="text-gray-500">·</span>
                <span class="text-gray-500">{{.RelativeTime}}</span>
            </div>
            <p class="mt-1 whitespace-pre-wrap break-words">{{renderContent .Content}}</p>
            <div class="flex gap-6 mt-2 text-gray-500 text-sm">
                <a href="/post/{{.ID}}" class="hover:text-blue-400 flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    {{.ReplyCount}}
                </a>
                <button hx-post="/web/repost" hx-vals='{"target":"{{.ID}}"}' hx-target="this" hx-swap="innerHTML" class="hover:text-green-400 flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    {{.RepostCount}}
                </button>
                <button hx-post="/web/like" hx-vals='{"target":"{{.ID}}"}' hx-target="this" hx-swap="innerHTML" class="hover:text-red-400 flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    {{.LikeCount}}
                </button>
            </div>
        </div>
    </div>
</article>
{{else}}
<div class="text-center py-12 text-gray-400">
    <svg class="w-12 h-12 mx-auto mb-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
    <p class="text-lg mb-2">No posts yet</p>
    <p class="text-sm">Be the first to post something!</p>
</div>
{{end}}
