{{define "content"}}
<header class="sticky top-0 z-10 bg-[#0a0a0a]/80 backdrop-blur border-b border-gray-800 px-4 py-3 flex items-center gap-4">
    <a href="/messages" class="text-white hover:text-gray-300 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </a>
    <div>
        <h1 class="text-xl font-bold">{{.PeerName}}</h1>
        <p class="text-xs text-gray-500 font-mono">{{.PeerShortPubkey}}</p>
    </div>
</header>

<div class="flex flex-col h-[calc(100vh-60px)]">
    <!-- Messages -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3" id="messages-container">
        {{if .Messages}}
        {{range .Messages}}
        <div class="flex {{if .IsSent}}justify-end{{else}}justify-start{{end}}">
            <div class="max-w-[75%] rounded-2xl px-4 py-2 {{if .IsSent}}bg-emerald-600 text-white{{else}}bg-gray-800 text-white{{end}}">
                <p class="text-sm">{{.Content}}</p>
                <p class="text-xs {{if .IsSent}}text-emerald-200{{else}}text-gray-500{{end}} mt-1">{{.RelativeTime}}</p>
            </div>
        </div>
        {{end}}
        {{else}}
        <div class="text-center py-12 text-gray-400">
            <p class="text-sm">No messages yet. Start the conversation!</p>
        </div>
        {{end}}
        <div class="text-center py-2">
            <p class="text-xs text-gray-600">Messages are end-to-end encrypted</p>
        </div>
    </div>

    <!-- Compose -->
    <div class="border-t border-gray-800 p-3">
        <form hx-post="/web/send-dm" hx-target="#messages-container" hx-swap="beforeend" hx-on::after-request="if(event.detail.successful) this.reset()" class="flex gap-2">
            <input type="hidden" name="recipient" value="{{.PeerPubkey}}">
            <input type="text" name="content" placeholder="Type a message..." autocomplete="off"
                class="flex-1 bg-gray-800 border border-gray-700 rounded-full px-4 py-2 text-white text-sm focus:border-emerald-500 focus:outline-none">
            <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white rounded-full px-4 py-2 text-sm font-bold transition-colors">Send</button>
        </form>
    </div>
</div>
{{end}}
