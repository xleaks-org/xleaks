  # Search & Discovery
  /api/search:
    get:
      tags: [Search]
      summary: Search posts or users
      operationId: search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (prefix with # for hashtag search, @ for user search)
        - name: type
          in: query
          schema:
            type: string
            enum: [posts, users]
            default: posts
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Missing query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

